name: DevSecOps Secure Pipeline

on:
  push:
    branches:
      - secure
      - main

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./secure
        run: npm install

      - name: Install ESLint Security
        working-directory: ./secure
        run: |
          npm install eslint eslint-plugin-security --save-dev

      - name: Run ESLint Security Scan
        working-directory: ./secure
        run: |
          npx eslint . || true

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit
	continue-on-error: true

      - name: Build Secure Docker Image
        working-directory: ./secure
        run: |
          docker build -t euvwa-secure .

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: euvwa-secure
          format: cyclonedx-json
          output-file: sbom-secure.json

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./secure
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Trivy Docker Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: euvwa-secure
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Start Secure Application
        working-directory: ./secure
        run: |
          npm start &
          sleep 20

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'