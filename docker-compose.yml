services:
  euvwa-secure:
    build:
      context: ./secure
      dockerfile: Dockerfile

    container_name: euvwa-secure

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      DB_PASSWORD_FILE: /run/secrets/db_password

    secrets:
      - db_password

    read_only: true

    tmpfs:
      - /tmp

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    restart: unless-stopped

secrets:
  db_password:
    file: ./secrets/db_password.txt